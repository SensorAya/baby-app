buildscript {
  repositories {
    mavenCentral()
  }
  dependencies {
    classpath("org.jetbrains.kotlin.plugin.compose:org.jetbrains.kotlin.plugin.compose.gradle.plugin:${kotlinVersion}")
  }
}

apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

group = 'com.sensoraya.compose'
version = '1.0.0'

android {
  namespace "com.sensoraya.compose"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
  buildFeatures {
    compose true
  }
}

dependencies {
  implementation 'androidx.activity:activity:1.8.2'
  implementation 'androidx.compose.foundation:foundation-android:1.10.6'
  implementation 'androidx.compose.ui:ui-android:1.10.6'
  implementation 'androidx.compose.material3:material3:1.5.0-alpha17'
  implementation 'androidx.compose.material3:material3-android:1.5.0-alpha17'
}
